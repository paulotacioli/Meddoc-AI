version: '3.9'

# ── Docker Compose para DESENVOLVIMENTO LOCAL ─────────────────
# Uso: docker-compose -f docker-compose.dev.yml up -d
# Sobe apenas os bancos de dados.
# Backend e frontend rodam direto com: npm run dev

services:
  postgres:
    image: postgres:16-alpine
    container_name: meddoc_postgres
    environment:
      POSTGRES_DB:       meddoc
      POSTGRES_USER:     meddoc
      POSTGRES_PASSWORD: meddoc123
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/schema.sql:/docker-entrypoint-initdb.d/01_schema.sql
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U meddoc"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  mongodb:
    image: mongo:7-jammy
    container_name: meddoc_mongo
    environment:
      MONGO_INITDB_ROOT_USERNAME: meddoc
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_PASSWORD:-meddoc123}
      MONGO_INITDB_DATABASE:      meddoc_docs
    volumes:
      - mongo_data:/data/db
    ports:
      - "27017:27017"
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: meddoc_redis
    command: redis-server --requirepass ${REDIS_PASSWORD:-meddoc123}
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    restart: unless-stopped

volumes:
  postgres_data:
  mongo_data:
  redis_data:
